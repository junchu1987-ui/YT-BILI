<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT → Bilibili 搬运工具</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<!-- ── Sidebar ── -->
<nav class="sidebar">
  <div class="logo">
    <span class="logo-icon">▶</span>
    <span>YT→哔哩</span>
  </div>
  <ul class="nav-links">
    <li><a href="#" class="nav-link active" data-tab="pipeline">🚀 流水线</a></li>
    <li><a href="#" class="nav-link" data-tab="sources">📋 来源管理</a></li>
    <li><a href="#" class="nav-link" data-tab="history">🕐 历史记录</a></li>
    <li><a href="#" class="nav-link" data-tab="settings">⚙️ 设置</a></li>
  </ul>
  <div class="bili-status" id="bili-status">
    <div class="status-dot" id="bili-dot"></div>
    <span id="bili-label">检查登录状态...</span>
  </div>
</nav>

<!-- ── Main ── -->
<main class="main">

  <!-- ═══ Tab: Pipeline ═══ -->
  <section class="tab-panel active" id="tab-pipeline">
    <div class="page-header">
      <h1>搬运流水线</h1>
      <div class="header-actions">
        <button class="btn btn-warning" id="btn-cancel" style="display:none;" title="终止当前任务">⏹ 停止</button>
        <button class="btn btn-ghost" id="btn-reset" title="重置流程">↺ 重置</button>
      </div>
    </div>

    <!-- Step indicators -->
    <div class="steps">
      <div class="step" id="step-scan">
        <div class="step-num">1</div>
        <div class="step-body">
          <div class="step-title">扫描</div>
          <div class="step-desc">识别新视频</div>
        </div>
      </div>
      <div class="step-arrow">›</div>
      <div class="step" id="step-download">
        <div class="step-num">2</div>
        <div class="step-body">
          <div class="step-title">下载</div>
          <div class="step-desc">获取视频文件</div>
        </div>
      </div>
      <div class="step-arrow">›</div>
      <div class="step" id="step-transcode">
        <div class="step-num">3</div>
        <div class="step-body">
          <div class="step-title">转码</div>
          <div class="step-desc">添加片头</div>
        </div>
      </div>
      <div class="step-arrow">›</div>
      <div class="step" id="step-upload">
        <div class="step-num">4</div>
        <div class="step-body">
          <div class="step-title">上传</div>
          <div class="step-desc">发布至B站</div>
        </div>
      </div>
    </div>

    <!-- Action panel -->
    <div class="action-panel" id="action-panel">
      <!-- dynamically rendered based on status -->
    </div>

    <!-- Video list -->
    <div id="video-list-section" style="display:none">
      <div class="section-header">
        <span id="video-list-title">视频列表</span>
        <label class="select-all-label" id="select-all-wrap" style="display:none">
          <input type="checkbox" id="chk-select-all" checked> 全选
        </label>
      </div>
      <div class="video-list" id="video-list"></div>
    </div>

    <!-- Log panel -->
    <div class="log-section">
      <div class="log-header">
        <span>实时日志</span>
        <button class="btn-tiny" id="btn-clear-log">清空</button>
      </div>
      <div class="log-body" id="log-body"></div>
    </div>
  </section>

  <!-- ═══ Tab: Sources ═══ -->
  <section class="tab-panel" id="tab-sources">
    <div class="page-header">
      <h1>来源管理</h1>
    </div>

    <div class="add-source-form">
      <input type="text" id="new-source-url" class="url-input"
        placeholder="粘贴 YouTube 频道 / 视频 / 播放列表 URL">
      <button class="btn btn-primary" id="btn-add-source">+ 添加</button>
    </div>

    <div class="source-list" id="source-list">
      <div class="empty-state">加载中...</div>
    </div>
  </section>

  <!-- ═══ Tab: History ═══ -->
  <section class="tab-panel" id="tab-history">
    <div class="page-header">
      <h1>历史记录</h1>
      <span class="count-badge" id="history-count">0</span>
    </div>
    <div class="history-list" id="history-list">
      <div class="empty-state">暂无记录</div>
    </div>
  </section>

  <!-- ═══ Tab: Settings ═══ -->
  <section class="tab-panel" id="tab-settings">
    <div class="page-header"><h1>设置</h1></div>

    <div class="settings-form">
      <div class="form-group">
        <label>代理地址</label>
        <input type="text" id="cfg-proxy" placeholder="http://127.0.0.1:10808">
        <span class="form-hint">留空 = 不使用代理</span>
      </div>
      <div class="form-group">
        <label>B站投稿分区</label>
        <select id="cfg-tid">
          <optgroup label="🎬 动画 (1)">
            <option value="24">24 · MAD·AMV</option>
            <option value="25">25 · MMD·3D</option>
            <option value="47">47 · 短片·手书·配音</option>
            <option value="86">86 · 特摄</option>
            <option value="210">210 · 手办·模玩</option>
            <option value="27">27 · 综合</option>
          </optgroup>
          <optgroup label="🎵 音乐 (3)">
            <option value="28">28 · 原创音乐</option>
            <option value="29">29 · 音乐现场</option>
            <option value="30">30 · VOCALOID·UTAU</option>
            <option value="31">31 · 翻唱</option>
            <option value="59">59 · 演奏</option>
            <option value="193">193 · MV</option>
            <option value="194">194 · 电音</option>
            <option value="130">130 · 音乐综合</option>
          </optgroup>
          <optgroup label="🎮 游戏 (4)">
            <option value="17">17 · 单机游戏</option>
            <option value="65">65 · 网络游戏</option>
            <option value="171">171 · 电子竞技</option>
            <option value="172">172 · 手机游戏</option>
            <option value="173">173 · 桌游棋牌</option>
            <option value="121">121 · GMV</option>
            <option value="136">136 · 音游</option>
            <option value="19">19 · Mugen</option>
          </optgroup>
          <optgroup label="🎭 娱乐 (5)">
            <option value="71">71 · 综艺</option>
            <option value="137">137 · 明星</option>
          </optgroup>
          <optgroup label="📺 电视剧 (11)">
            <option value="185">185 · 国产剧</option>
            <option value="187">187 · 海外剧</option>
          </optgroup>
          <optgroup label="🎌 番剧 (13)">
            <option value="33">33 · 连载动画</option>
            <option value="32">32 · 完结动画</option>
            <option value="51">51 · 资讯</option>
            <option value="152">152 · 官方延伸</option>
          </optgroup>
          <optgroup label="🎥 电影 (23)">
            <option value="147">147 · 国产电影</option>
            <option value="145">145 · 欧美电影</option>
            <option value="146">146 · 日本电影</option>
            <option value="83">83 · 其他国家</option>
          </optgroup>
          <optgroup label="📚 知识 (36)">
            <option value="201">201 · 科学科普</option>
            <option value="207">207 · 财经商业</option>
            <option value="208">208 · 校园学习</option>
            <option value="209">209 · 职业职场</option>
            <option value="229">229 · 设计·创意</option>
            <option value="228">228 · 人文历史</option>
            <option value="124">124 · 社科·法律·心理</option>
            <option value="122">122 · 野生技能协会</option>
          </optgroup>
          <optgroup label="👻 鬼畜 (119)">
            <option value="22">22 · 鬼畜调教</option>

            <option value="126">126 · 人力VOCALOID</option>
            <option value="216">216 · 鬼畜剧场</option>
            <option value="127">127 · 教程演示</option>
          </optgroup>
          <optgroup label="💃 舞蹈 (129)">
            <option value="20">20 · 宅舞</option>
            <option value="198">198 · 街舞</option>
            <option value="199">199 · 明星舞蹈</option>
            <option value="200">200 · 中国舞</option>
            <option value="154">154 · 舞蹈综合</option>
            <option value="156">156 · 舞蹈教程</option>
          </optgroup>
          <optgroup label="👗 时尚 (155)">
            <option value="157">157 · 美妆</option>
            <option value="158">158 · 服饰</option>
            <option value="159">159 · T台</option>
            <option value="192">192 · 风尚标</option>
          </optgroup>
          <optgroup label="🏠 生活 (160)">
            <option value="21">21 · 日常</option>

            <option value="161">161 · 手工</option>
            <option value="162">162 · 绘画</option>

          </optgroup>

            <option value="153">153 · 国产动画</option>
            <option value="168">168 · 国产原创相关</option>
            <option value="195">195 · 动态漫·广播剧</option>
            <option value="169">169 · 布袋戏</option>
            <option value="170">170 · 资讯</option>
          </optgroup>
          <optgroup label="🎞️ 纪录片 (177)">
            <option value="37">37 · 人文·历史</option>
            <option value="178">178 · 科学·探索·自然</option>
            <option value="179">179 · 军事</option>
            <option value="180">180 · 社会·美食·旅行</option>
          </optgroup>
          <optgroup label="🎬 影视 (181)">
            <option value="182">182 · 影视杂谈</option>
            <option value="183">183 · 影视剪辑</option>
            <option value="85">85 · 短片</option>
            <option value="184">184 · 预告·资讯</option>
          </optgroup>
          <optgroup label="💻 科技 (188)">
            <option value="95">95 · 数码</option>
            <option value="230">230 · 软件应用</option>
            <option value="231">231 · 计算机技术</option>
            <option value="232">232 · 工业·工程·机械</option>
            <option value="233">233 · 极客DIY</option>
          </optgroup>
          <optgroup label="🍜 美食 (211)">
            <option value="76">76 · 美食制作</option>
            <option value="212">212 · 美食侦探</option>
            <option value="213">213 · 美食测评</option>
            <option value="214">214 · 田园美食</option>
            <option value="215">215 · 美食记录</option>
          </optgroup>
          <optgroup label="🐾 动物圈 (217)">
            <option value="75">75 · 动物综合</option>
            <option value="218">218 · 喵星人</option>
            <option value="219">219 · 汪星人</option>
            <option value="220">220 · 大熊猫</option>
            <option value="221">221 · 野生动物</option>
            <option value="222">222 · 爬宠</option>
          </optgroup>
          <optgroup label="🚗 汽车 (223)">
            <option value="176">176 · 汽车生活</option>
            <option value="224">224 · 汽车文化</option>
            <option value="225">225 · 汽车极客</option>
            <option value="226">226 · 智能出行</option>
            <option value="227">227 · 购车攻略</option>
          </optgroup>
          <optgroup label="⚽ 运动 (234)">
            <option value="164">164 · 健身</option>
            <option value="235">235 · 篮球·足球</option>
            <option value="236">236 · 竞技体育</option>
            <option value="237">237 · 运动文化</option>
            <option value="238">238 · 运动综合</option>
          </optgroup>
        </select>
      </div>
      <div class="form-group">
        <label>片头视频路径</label>
        <input type="text" id="cfg-intro" placeholder="./assets/intro.mp4">
        <span class="form-hint">留空 = 不添加片头</span>
      </div>
      <div class="form-group">
        <label>视频简介前缀</label>
        <textarea id="cfg-desc" rows="3" placeholder="本视频搬运自YouTube..."></textarea>
      </div>
      <button class="btn btn-primary" id="btn-save-config">保存设置</button>
      <span class="save-ok" id="save-ok" style="display:none">✓ 已保存</span>
    </div>

    <div class="divider"></div>
    <div class="bili-login-section">
      <h3>B站登录</h3>
      <div id="bili-login-info" class="login-info"></div>
      <p class="form-hint">如 Cookie 过期，请在终端运行: <code>biliup login</code></p>
    </div>
  </section>

</main>

<script src="/static/app.js"></script>
</body>
</html>
